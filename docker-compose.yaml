version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: ethixnode_db_container
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: ethix_admin
      POSTGRES_PASSWORD: hackathon_password
      POSTGRES_DB: ethixnode_db
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped

volumes:
  postgres_data: