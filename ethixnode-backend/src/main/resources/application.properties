# Server configuration
server.port=8080
spring.application.name=ethixnode-backend

# PostgreSQL Database Connection (Matching Docker Compose)
spring.datasource.url=jdbc:postgresql://localhost:5432/ethixnode_db
spring.datasource.username=ethix_admin
spring.datasource.password=hackathon_password
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA & Hibernate Settings
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true

# Python AI Microservice URL
ethixnode.ai.service.url=http://localhost:5000